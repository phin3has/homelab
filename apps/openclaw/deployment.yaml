apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: install-tools
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              apk add --no-cache curl &&
              GH_VERSION=2.62.0 &&
              curl -fsSL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_amd64.tar.gz" \
                | tar xz -C /tools --strip-components=1 &&
              cat > /tools/bin/git-credential-gh-token <<'SCRIPT'
              #!/bin/sh
              case "$1" in
                get)
                  echo "protocol=https"
                  echo "host=github.com"
                  echo "username=x-access-token"
                  echo "password=$GH_TOKEN"
                  ;;
              esac
              SCRIPT
              chmod +x /tools/bin/git-credential-gh-token
          volumeMounts:
            - name: tools
              mountPath: /tools
        - name: install-qmd
          image: ghcr.io/openclaw/openclaw:2026.3.23-2
          command:
            - sh
            - -c
            - |
              if [ ! -f /home/node/.openclaw/qmd/node_modules/.package-lock.json ]; then
                echo "Installing QMD..."
                mkdir -p /home/node/.openclaw/qmd &&
                cd /home/node/.openclaw/qmd &&
                npm init -y &&
                npm install --install-links @tobilu/qmd &&
                ln -sf /home/node/.openclaw/qmd/node_modules/.bin/qmd /home/node/.openclaw/qmd/qmd
              else
                echo "QMD already installed, skipping."
              fi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
        - name: install-python-packages
          image: python:3.11-alpine
          command:
            - sh
            - -c
            - |
              if [ ! -d /home/node/.openclaw/python-packages/agentmail ]; then
                echo "Installing Python packages..."
                mkdir -p /home/node/.openclaw/python-packages &&
                pip install --target /home/node/.openclaw/python-packages agentmail
              else
                echo "Python packages already installed, skipping."
              fi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
        - name: seed-workspace
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              WORKSPACE="/home/node/.openclaw/workspace"
              mkdir -p "$WORKSPACE" "$WORKSPACE/memory"

              # Seed workspace files only if they don't already exist (preserve user edits)
              for file in AGENTS.md SOUL.md IDENTITY.md USER.md MEMORY.md HEARTBEAT.md; do
                if [ ! -f "$WORKSPACE/$file" ]; then
                  echo "Seeding $file..."
                  cp "/seed/$file" "$WORKSPACE/$file"
                else
                  echo "$file already exists, skipping."
                fi
              done

              # Always update openclaw.json config (not user-editable workspace file)
              echo "Writing openclaw.json..."
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: workspace-seed
              mountPath: /seed
            - name: openclaw-config
              mountPath: /config
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.23-2
          command: ["node", "dist/index.js", "gateway"]
          ports:
            - containerPort: 18789
              name: http
          env:
            - name: PATH
              value: "/home/node/.openclaw/qmd/node_modules/.bin:/tools/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: PYTHONPATH
              value: "/home/node/.openclaw/python-packages"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            - name: GIT_CONFIG_COUNT
              value: "1"
            - name: GIT_CONFIG_KEY_0
              value: "credential.https://github.com.helper"
            - name: GIT_CONFIG_VALUE_0
              value: "/tools/bin/git-credential-gh-token"
            - name: OPENCLAW_GATEWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openclaw-env
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-env
                  key: ANTHROPIC_API_KEY
            - name: NOTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-env
                  key: NOTION_API_KEY
          envFrom:
            - secretRef:
                name: openclaw-env
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tools
              mountPath: /tools
              readOnly: true
            - name: openclaw-data
              mountPath: /home/node/.openclaw
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
      volumes:
        - name: tools
          emptyDir: {}
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: workspace-seed
          configMap:
            name: openclaw-workspace-seed
        - name: openclaw-config
          configMap:
            name: openclaw-config
